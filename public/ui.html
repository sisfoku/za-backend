          lg: 'var(--radius)',
          md: 'calc(var(--radius) - 2px)',
          sm: 'calc(var(--radius) - 4px)',
        },
        fontFamily: { sans: ['Inter','ui-sans-serif','system-ui','sans-serif'] },

          'fade-in': { from: { opacity: 0, transform: 'translateY(4px)' }, to: { opacity: 1, transform: 'translateY(0)' } },

        },

          'fade-in': 'fade-in .2s ease-out',
          'slide-in': 'slide-in .25s ease-out',
          'pulse-dot': 'pulse-dot 1.6s ease-in-out infinite',
        }
      }
    }
  }
</script>

  .card { background: hsl(var(--card)); border: 1px solid hsl(var(--border)); border-radius: var(--radius); }

/* ============================ HELPERS ============================ */
function $(sel,root=document){ return root.querySelector(sel); }
function $$(sel,root=document){ return Array.from(root.querySelectorAll(sel)); }
function el(html){ const t=document.createElement("template"); t.innerHTML=html.trim(); return t.content.firstElementChild; }
function refreshIcons(){ if(window.lucide) lucide.createIcons(); }
function initials(name){ return (name||"?").trim().charAt(0).toUpperCase(); }
function escapeHtml(s){ return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function nowTime(){ const d=new Date(); return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); }
function persist(){
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      user: state.user, activeView: state.activeView, theme: state.theme,
      activeContactId: state.activeContactId, activeOrderId: state.activeOrderId,
    }));
  } catch(e){}
}
function loadPersisted(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return;
    const d = JSON.parse(raw);
    if(d.user) state.user = d.user;
    if(d.activeView) state.activeView = d.activeView;
    if(d.theme){ state.theme = d.theme; }
    if(d.activeContactId) state.activeContactId = d.activeContactId;
    if(d.activeOrderId) state.activeOrderId = d.activeOrderId;
  } catch(e){}
}
function applyTheme(){
  if(state.theme==="dark"){ document.documentElement.classList.add("dark"); }
  else { document.documentElement.classList.remove("dark"); }
}
function toggleTheme(){
  state.theme = state.theme==="dark" ? "light" : "dark";
  applyTheme(); persist(); render();
}

function toast(msg, type="default"){
  const colors = {
    default:  "border-border bg-card text-foreground",
    success:  "border-emerald-200 bg-emerald-50 text-emerald-800 dark:border-emerald-900 dark:bg-emerald-950 dark:text-emerald-200",
    error:    "border-rose-200 bg-rose-50 text-rose-800 dark:border-rose-900 dark:bg-rose-950 dark:text-rose-200",
    warning:  "border-amber-200 bg-amber-50 text-amber-800 dark:border-amber-900 dark:bg-amber-950 dark:text-amber-200",
    info:     "border-teal-200 bg-teal-50 text-teal-800 dark:border-teal-900 dark:bg-teal-950 dark:text-teal-200",
  };
  const icons = { default:"Info", success:"CheckCircle2", error:"XCircle", warning:"AlertTriangle", info:"Bell" };
  const node = el(`<div class="toast-in flex items-start gap-3 rounded-lg border px-4 py-3 shadow-lg ${colors[type]||colors.default}">
    <i data-lucide="${icons[type]||icons.default}" class="w-4 h-4 mt-0.5 shrink-0"></i>
    <p class="text-sm font-medium leading-snug">${escapeHtml(msg)}</p>
  </div>`);
  $("#toast-container").appendChild(node);
  refreshIcons();
  setTimeout(()=>{ node.style.transition="all .3s"; node.style.opacity="0"; node.style.transform="translateY(8px)"; setTimeout(()=>node.remove(),300); }, 3200);
}

function doLogin(email, password){
  if(!email || !password){ toast("Email & password wajib diisi","error"); return false; }
  if(password.length < 4){ toast("Password minimal 4 karakter","error"); return false; }
  const acc = DEMO_ACCOUNTS.find(a=>a.email.toLowerCase()===email.toLowerCase() && a.password===password);
  let user;
  if(acc){
    user = { id:"demo-"+acc.role, name:acc.name, email:acc.email, phone:"0812-0000-"+acc.role.slice(0,3), role:acc.role, status:"active", createdAt:"2024-01-01", lastLogin: nowTime() };
  } else {
    // fallback: any email + password >= 4 → operator
    user = { id:"u-"+Date.now(), name: email.split("@")[0].replace(/[._-]/g," ").replace(/\b\w/g,c=>c.toUpperCase())||"Pengguna", email, phone:"0812-0000-0000", role:"operator", status:"active", createdAt:"2024-01-01", lastLogin: nowTime() };
  }
  state.user = user;
  state.activeView = "overview";
  state.sidebarOpen = false;
  persist();
  toast("Berhasil masuk sebagai "+ROLE_LABELS[user.role],"success");
  render();
  return true;
}
function doRegister(form){
  const name=form.name.value.trim(), email=form.email.value.trim(), wa=form.wa.value.trim(), pw=form.password.value, cpw=form.confirm.value;
  if(!name||!email||!wa||!pw){ toast("Lengkapi semua field","error"); return; }
  if(pw.length<6){ toast("Password minimal 6 karakter","error"); return; }
  if(pw!==cpw){ toast("Konfirmasi password tidak cocok","error"); return; }
  if(!form.terms.checked){ toast("Anda harus menyetujui syarat & ketentuan","error"); return; }
  state.user = { id:"u-"+Date.now(), name, email, phone:wa, role:"operator", status:"active", createdAt:"2025-01-15", lastLogin: nowTime() };
  state.activeView = "overview";
  persist();
  toast("Pendaftaran berhasil! Selamat datang "+name,"success");
  render();
}
function doLogout(){
  state.user = null;
  state.authView = "login";
  state.sidebarOpen = false;
  persist();
  toast("Anda telah keluar","info");
  render();
}
function quickLogin(role){
  const acc = DEMO_ACCOUNTS.find(a=>a.role===role);
  if(acc) doLogin(acc.email, acc.password);
}

let ddListener = null;
function toggleDropdown(name){
  const dd = $("#dd-"+name);
  if(!dd) return;
  const isHidden = dd.classList.contains("hidden");
  $$(".dropdown").forEach(d=>d.classList.add("hidden"));
  if(isHidden) dd.classList.remove("hidden");
  if(!ddListener){
    ddListener = (e)=>{ if(!e.target.closest(".relative")) { $$(".dropdown").forEach(d=>d.classList.add("hidden")); } };
    document.addEventListener("click", ddListener);
  }
}

function navigate(view){
  if(!canAccess(state.user.role, view)){ toast("Anda tidak memiliki akses ke modul ini","error"); return; }
  state.activeView = view;
  state.sidebarOpen = false;
  const w=$("#sidebar-mobile-wrap"); if(w) w.classList.add("hidden");
  persist();
  render();
}

function renderModule(){
  const c = $("#content");

  switch(v){
    case "overview":   return renderOverview(c);
    case "chatbot":    return renderChatbot(c);
    case "contacts":   return renderContacts(c);
    case "properties": return renderProperties(c);
    case "orders":     return renderOrders(c);
    case "marketing":  return renderMarketing(c);
    case "finance":    return renderFinance(c);
    case "users":      return renderUsers(c);
    case "settings":   return renderSettings(c);
    default: c.innerHTML = "<div class='p-6'>Modul tidak ditemukan</div>";
  }
}

function msgBubble(m, contact){
  const out = m.direction==="out";
  const ticks = out ? (m.status==="read"?`<span class="text-sky-500">✓✓</span>`:m.status==="delivered"?`<span class="text-muted-foreground">✓✓</span>`:m.status==="sent"?`<span class="text-muted-foreground">✓</span>`:`<span class="text-rose-500">✕</span>`) : "";

function sendChatMessage(){
  const inp = $("#msgInput"); if(!inp) return;
  const text = inp.value.trim(); if(!text) return;
  if(!state.activeContactId){ toast("Pilih kontak dulu","warning"); return; }
  const id = "m"+(state.chatNextMsgId++);
  state.chatMessages.push({ id, contactId:state.activeContactId, direction:"out", text, status:"sent", timestamp:nowTime(), isAI:false });
  inp.value=""; inp.style.height="auto";
  renderModule();
  // status progression
  setTimeout(()=>{ const m=state.chatMessages.find(x=>x.id===id); if(m){ m.status="delivered"; if(state.activeView==="chatbot") refreshChatMessages(); } }, 800);
  setTimeout(()=>{ const m=state.chatMessages.find(x=>x.id===id); if(m){ m.status="read"; if(state.activeView==="chatbot") refreshChatMessages(); } }, 1500);
  // AI auto-reply
  if(state.chatAIAuto){
    setTimeout(()=>{
      const replyId = "m"+(state.chatNextMsgId++);
      state.chatMessages.push({ id:replyId, contactId:state.activeContactId, direction:"in", text:AI_REPLIES[Math.floor(Math.random()*AI_REPLIES.length)], status:"read", timestamp:nowTime(), isAI:true });
      const ct = state.chatContacts.find(c=>c.id===state.activeContactId); if(ct){ ct.lastMessage=state.chatMessages[state.chatMessages.length-1].text; ct.lastMessageAt=nowTime(); }
      if(state.activeView==="chatbot") renderModule();
    }, 1200);
  }
}

function togglePref(key){
  const map = { theme:(v)=>{ state.theme=v?"dark":"light"; applyTheme(); }, notifEmail:v=>state.prefs.notifEmail=v, notifPush:v=>state.prefs.notifPush=v, aiAutoreply:v=>state.prefs.aiAutoreply=v, sound:v=>state.prefs.sound=v };
  if(key==="theme"){ const nv = state.theme!=="dark"; state.theme = nv?"dark":"light"; applyTheme(); persist(); toast("Tema "+(nv?"gelap":"terang")+" aktif","info"); }
  else { state.prefs[key] = !state.prefs[key]; toast(state.prefs[key]?"Aktif":"Nonaktif","info"); }
  renderModule();
}

/* ============================ MODAL ============================ */
function openModal({title, body, footer}){
  const root = $("#modal-root");
  root.innerHTML = `<div class="fixed inset-0 z-[90] flex items-center justify-center p-4 modal-backdrop" onclick="if(event.target===this)closeModal()">
    <div class="card w-full max-w-lg max-h-[90vh] flex flex-col animate-fade-in">
      <div class="flex items-center justify-between p-5 border-b border-border">
        <h3 class="font-semibold text-lg">${escapeHtml(title)}</h3>
        <button onclick="closeModal()" class="btn h-8 w-8 p-0 text-muted-foreground hover:bg-accent"><i data-lucide="X" class="w-4 h-4"></i></button>
      </div>
      <div class="flex-1 overflow-y-auto scroll-thin p-5">${body}</div>
      ${footer?`<div class="flex flex-wrap gap-2 justify-end p-5 border-t border-border">${footer}</div>`:''}
    </div>
  </div>`;
  refreshIcons();
}
function closeModal(){ $("#modal-root").innerHTML=""; }

/* ============================ INIT ============================ */
function init(){
  loadPersisted();
  applyTheme();
  render();
  // close dropdowns on Escape
  document.addEventListener("keydown", e=>{ if(e.key==="Escape"){ $$(".dropdown").forEach(d=>d.classList.add("hidden")); closeModal(); } });
}
window.addEventListener("DOMContentLoaded", init);

// expose for inline handlers
Object.assign(window, {
  quickLogin, doLogout, toggleTheme, navigate, openSidebar, closeSidebar, toggleDropdown,
  setChatFilter, setChatMobileList, selectContact, updateContactStage, addTag, removeTag, useAISuggestion, sendChatMessage,
  gotoChat, openContactDialog, openContactDetail,
  openPropDialog, openPropDetail,
  openOrderDialog, openOrderDetail,
  openInvoiceDialog, markInvoicePaid, openInvoiceDetail,
  openUserDialog, toggleUserStatus, deleteUser,
  toggleWASession, togglePref, useTemplate,
  openModal, closeModal, toast, render, renderModule,
});
</script>
