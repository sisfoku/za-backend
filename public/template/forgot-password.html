<!DOCTYPE html>
<html lang="id" class="">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Lupa Password — PropertiKu Agent</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="assets/tailwind-config.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/shared.css" />
<script>(function(){var t=localStorage.getItem('propertiku-theme')||'light';if(t==='dark')document.documentElement.classList.add('dark');})();</script>
</head>
<body class="min-h-screen">
<div id="app"></div>

<script src="assets/data.js"></script>
<script src="assets/rbac.js"></script>
<script src="assets/auth.js"></script>
<script src="assets/layout.js"></script>

<script>
(function(){
  let sent = false;
  function render(){
    document.getElementById("app").innerHTML = `
      <div class="min-h-screen w-full grid lg:grid-cols-2 bg-background">
        <aside class="relative hidden lg:flex flex-col justify-between overflow-hidden p-12 text-white" style="background:linear-gradient(135deg,#047857,#0f766e 45%,#064e3b);">
          <div class="absolute inset-0 opacity-20" style="background-image:radial-gradient(circle at 20% 30%, white 1px, transparent 1px),radial-gradient(circle at 70% 60%, white 1px, transparent 1px);background-size:48px 48px;"></div>
          <a href="index.html" class="relative z-10 flex items-center gap-3">
            <div class="grid place-items-center h-11 w-11 rounded-xl bg-white/15 backdrop-blur ring-1 ring-white/25"><i data-lucide="Building2" class="w-6 h-6"></i></div>
            <div>
              <p class="text-lg font-bold leading-tight">PropertiKu Agent</p>
              <p class="text-xs text-emerald-100/80">AI Assistant · WhatsApp Waha</p>
            </div>
          </a>
          <div class="relative z-10 space-y-6 max-w-md">
            <h2 class="text-3xl font-bold leading-tight">Lupa password? Kami bantu reset.</h2>
            <p class="text-emerald-50/90 text-sm leading-relaxed">Masukkan email akun Anda, dan kami akan mengirimkan tautan reset password yang aman.</p>
          </div>
          <p class="relative z-10 text-xs text-emerald-100/70">© 2025 PropertiKu Agent. Ditenagai oleh Waha WhatsApp API.</p>
        </aside>

        <div class="flex flex-col min-h-screen">
          <div class="lg:hidden flex items-center gap-2 p-6 border-b border-border">
            <a href="index.html" class="grid place-items-center h-9 w-9 rounded-lg bg-emerald-600 text-white"><i data-lucide="Building2" class="w-5 h-5"></i></a>
            <p class="font-bold">PropertiKu Agent</p>
          </div>
          <div class="flex-1 flex items-center justify-center p-6 sm:p-10">
            <div class="w-full max-w-md">
              ${sent ? `
                <div class="text-center space-y-4">
                  <div class="mx-auto w-14 h-14 rounded-full bg-emerald-50 dark:bg-emerald-950/40 grid place-items-center text-emerald-600"><i data-lucide="MailCheck" class="w-7 h-7"></i></div>
                  <h1 class="text-2xl font-bold">Cek Email Anda</h1>
                  <p class="text-sm text-muted-foreground">Tautan reset password telah dikirim ke email Anda. Ikuti instruksi untuk mengatur ulang password.</p>
                  <button onclick="location.href='login.html'" class="btn w-full h-10 bg-emerald-600 hover:bg-emerald-700 text-white font-medium">Kembali ke Login</button>
                </div>
              ` : `
                <h1 class="text-2xl font-bold tracking-tight">Lupa Password?</h1>
                <p class="text-sm text-muted-foreground mt-1.5">Masukkan email Anda, kami akan mengirim tautan reset password</p>
                <form id="forgotForm" class="space-y-4 mt-7">
                  <div class="space-y-1.5"><label class="text-sm font-medium">Email</label><input name="email" type="email" required placeholder="anda@propertiku.id" class="flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm" /></div>
                  <button type="submit" class="btn w-full h-10 bg-emerald-600 hover:bg-emerald-700 text-white font-medium">Kirim Tautan Reset</button>
                </form>
                <p class="mt-6 text-center text-sm text-muted-foreground">Ingat password? <a href="login.html" class="font-semibold text-emerald-600 hover:underline">Masuk</a></p>
              `}
              <p class="mt-6 text-center text-xs"><a href="index.html" class="text-muted-foreground hover:text-foreground">← Kembali ke Gallery</a></p>
            </div>
          </div>
        </div>
      </div>`;
    refreshIcons();

    const f = document.getElementById("forgotForm");
    if(f){
      f.addEventListener("submit", e=>{
        e.preventDefault();
        sent = true;
        toast("Tautan reset telah dikirim","success");
        render();
      });
    }
  }
  render();
})();
</script>
</body>
</html>
